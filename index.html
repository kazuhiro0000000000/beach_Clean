<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffd98a">
<title>ビーチクリーン</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  ruby{ ruby-position:over; }
  rt{ font-size:.5em; opacity:.85; font-weight:600; letter-spacing:0; }
  html,body {
    position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:#e9c889;
    user-select:none; -webkit-user-select:none; touch-action:none;
    overscroll-behavior:none; -webkit-overflow-scrolling:auto;
  }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#1a2a3a; }
  #game { position:relative; width:100%; height:100%; max-width:540px; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,.5); }
  canvas { display:block; width:100%; height:100%; }

  /* HUD */
  #hud { position:absolute; top:0; left:0; right:0;
    padding-top:max(env(safe-area-inset-top),10px); padding-left:14px; padding-right:14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; color:#fff; text-shadow:0 2px 5px rgba(120,80,0,.5); z-index:5; }
  .hud-box{ background:rgba(255,255,255,.25); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    border-radius:14px; padding:7px 13px; border:1px solid rgba(255,255,255,.45); }
  #scoreVal{ font-size:24px; font-weight:800; }
  #scoreLbl{ font-size:11px; opacity:.9; font-weight:600; }
  #lives{ font-size:20px; letter-spacing:2px; }
  #levelTag{ font-size:12px; font-weight:700; margin-top:4px; text-align:right; }

  #muteBtn{ position:absolute; z-index:7; right:14px; bottom:max(env(safe-area-inset-bottom),14px);
    width:46px; height:46px; border-radius:50%; border:1px solid rgba(255,255,255,.5);
    background:rgba(255,255,255,.25); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    font-size:22px; line-height:1; cursor:pointer; padding:0; }
  #muteBtn:active{ transform:scale(.92); }
  #toast{ position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(.6);
    background:rgba(255,255,255,.96); color:#b35c00; padding:14px 26px; border-radius:20px;
    font-weight:800; font-size:20px; box-shadow:0 10px 30px rgba(0,0,0,.3); opacity:0;
    pointer-events:none; z-index:6; text-align:center; white-space:nowrap; transition:opacity .3s, transform .3s; }
  #toast.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

  /* オーバーレイ */
  .overlay{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; color:#fff; padding:22px;
    background:linear-gradient(180deg,#5bc6e8 0%,#7fd6ee 45%,#ffe1a3 46%,#f6cd7d 100%); }
  .overlay.hidden{ display:none; }
  .titlewrap{ margin-bottom:6px; }
  .title{ font-size:46px; font-weight:900; letter-spacing:1px; line-height:1;
    color:#fff; text-shadow:0 4px 0 #ff9d3d, 0 8px 14px rgba(0,0,0,.25); }
  .title .em{ font-size:38px; }
  .sub{ font-size:15px; color:#6b4a12; font-weight:700; margin:10px 0 4px; }
  .pick{ font-size:14px; color:#6b4a12; font-weight:700; margin:12px 0 10px; }
  .chars{ display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; max-width:360px; }
  .char{ width:74px; background:rgba(255,255,255,.55); border:3px solid transparent; border-radius:18px;
    padding:10px 4px 8px; cursor:pointer; transition:transform .12s, border-color .12s, background .12s; }
  .char:active{ transform:scale(.94); }
  .char .face{ font-size:40px; line-height:1; }
  .char .nm{ font-size:12px; font-weight:800; color:#5a3a00; margin-top:4px; }
  .char.sel{ border-color:#ff8a00; background:#fff; transform:translateY(-4px); box-shadow:0 8px 18px rgba(255,140,0,.4); }
  .rules{ background:rgba(255,255,255,.6); border-radius:16px; padding:12px 16px; font-size:13px;
    line-height:1.65; max-width:340px; margin-bottom:18px; text-align:left; color:#5a3a00; }
  .rules b{ color:#c25b00; }
  .btn{ pointer-events:auto; background:linear-gradient(180deg,#ffd86b,#ffae33); color:#5a3a00;
    border:none; border-radius:30px; padding:16px 48px; font-size:21px; font-weight:900;
    box-shadow:0 8px 20px rgba(255,150,0,.45); cursor:pointer; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  #finalScore{ font-size:42px; font-weight:900; color:#fff; text-shadow:0 3px 0 #ff9d3d; margin:4px 0 2px; }
  #bestScore{ font-size:14px; color:#6b4a12; font-weight:700; margin-bottom:16px; }
  .hint{ position:absolute; bottom:max(env(safe-area-inset-bottom),14px); left:0; right:0;
    text-align:center; font-size:12.5px; color:#6b4a12; font-weight:600; }
  /* ノーダメージ・エンディングの「生き物が降ってくる」演出 */
  .rainLayer{ position:absolute; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .endContent{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%; }
  .rain{ position:absolute; top:-12%; will-change:transform; animation:fallRain linear infinite; }
  @keyframes fallRain{ 0%{transform:translateY(-12vh) rotate(0deg);} 100%{transform:translateY(118vh) rotate(360deg);} }
</style>
</head>
<body>
<div id="wrap">
  <div id="game">
    <canvas id="cv"></canvas>

    <div id="hud">
      <div class="hud-box"><div id="scoreLbl">スコア</div><div id="scoreVal">0</div></div>
      <div class="hud-box" style="text-align:right"><div id="lives">❤️❤️❤️</div><div id="levelTag">Lv.1 ノーマル</div></div>
    </div>

    <button id="muteBtn" aria-label="サウンド切り替え">🔊</button>

    <div id="toast"></div>

    <!-- スタート画面 -->
    <div id="startScreen" class="overlay">
      <div class="titlewrap">
        <div class="title"><span class="em">🏖️</span> ビーチクリーン</div>
      </div>
      <div class="sub">砂浜のゴミをきれいにしよう！</div>

      <div class="pick">👇 キャラクターをえらんでね</div>
      <div class="chars" id="charPick"></div>

      <div class="rules">
        💦 画面を<b>タッチ中</b>はお水が自動で発射！<br>
        ➡️ 指を左右に動かしてキャラを移動。<br>
        🛍️🥫🧃 流れてくる<b>ゴミ</b>を当てて回収！<br>
        🦀🐠 <b>砂浜の仲間</b>は「うたないで！」が出るよ。当てると -5点＋<b>ショットレベルダウン</b>（少し待つと回復）。<br>
        ⚡ スコアが上がると水鉄砲が<b>パワーアップ</b>！<br>
        👹 300点と500点で<b>ゴミだいおう</b>（HP20）が出現！<br>
        🦖 そのあと<b>ラスボス「ゴミラ」</b>（HP40）が登場、決戦だ！
      </div>
      <button class="btn" id="playBtn">▶ スタート</button>
      <div class="hint">スマホは縦向きで遊んでね</div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="overScreen" class="overlay hidden"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const startScreen=document.getElementById('startScreen');
  const overScreen=document.getElementById('overScreen');
  const scoreVal=document.getElementById('scoreVal');
  const livesEl=document.getElementById('lives');
  const levelTag=document.getElementById('levelTag');
  const toast=document.getElementById('toast');
  const charPick=document.getElementById('charPick');

  let W=0,H=0,DPR=1;
  function resize(){
    const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize);

  // ===== サウンド（Web Audio で生成。BGM＋効果音） =====
  const AUD=(function(){
    let ctx=null, master=null, bgm=null, sfx=null, on=true, barTimer=null, bar=0, lastShoot=0;
    const AC=window.AudioContext||window.webkitAudioContext;
    function init(){
      if(ctx||!AC) return;
      ctx=new AC();
      master=ctx.createGain(); master.gain.value=0.9; master.connect(ctx.destination);
      bgm=ctx.createGain(); bgm.gain.value=0.0; bgm.connect(master);
      sfx=ctx.createGain(); sfx.gain.value=0.9; sfx.connect(master);
    }
    function resume(){ if(ctx&&ctx.state==='suspended') ctx.resume(); }
    // 単音
    function tone(freq,dur,type,vol,delay,glideTo,dest){
      if(!ctx||!on) return;
      const t=ctx.currentTime+(delay||0);
      const o=ctx.createOscillator(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
      if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); g.connect(dest||sfx); o.start(t); o.stop(t+dur+0.03);
    }
    // やわらかいパッド（BGM和音用）
    function pad(freq,dur,t){
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq;
      const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=freq*1.005;
      const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1200;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.16,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); o2.connect(g); g.connect(lp); lp.connect(bgm);
      o.start(t); o2.start(t); o.stop(t+dur+0.05); o2.stop(t+dur+0.05);
    }
    // 波の音（やさしいノイズのうねり）
    function wave(t){
      const len=ctx.sampleRate*2.2; const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=520; bp.Q.value=0.6;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(0.05,t+1.0); g.gain.linearRampToValueAtTime(0.0001,t+2.1);
      src.connect(bp); bp.connect(g); g.connect(bgm); src.start(t); src.stop(t+2.2);
    }
    // 4小節進行（I–V–vi–IV / Cメジャー、ゆったり）
    const prog=[ [261.63,329.63,392.00], [196.00,246.94,392.00], [220.00,261.63,329.63], [174.61,220.00,349.23] ];
    const barLen=3.0;
    function playBar(){
      if(!ctx||!on) return;
      const t=ctx.currentTime+0.06; const chord=prog[bar%prog.length];
      chord.forEach(f=>pad(f,barLen,t));
      const arp=[chord[0]*2,chord[2]*2,chord[1]*2,chord[2]*2];
      for(let i=0;i<arp.length;i++) tone(arp[i],0.55,'sine',0.07,0.06+i*(barLen/4),null,bgm);
      if(bar%2===0) wave(t);
      bar++;
    }
    function startBGM(){
      init(); resume(); if(!ctx) return;
      bgm.gain.cancelScheduledValues(ctx.currentTime);
      bgm.gain.setTargetAtTime(on?0.28:0.0, ctx.currentTime, 0.6);
      if(!barTimer){ playBar(); barTimer=setInterval(playBar, barLen*1000); }
    }
    function toggle(){
      init();
      on=!on;
      if(master) master.gain.setTargetAtTime(on?0.9:0.0, ctx.currentTime, 0.05);
      if(on) resume();
      return on;
    }
    // 効果音
    function shoot(){ const n=performance.now(); if(n-lastShoot<90) return; lastShoot=n; tone(880,0.09,'triangle',0.05,0,1320); }
    function collect(){ tone(660,0.10,'sine',0.16,0,990); tone(990,0.12,'sine',0.12,0.05,1320); }
    function friend(){ tone(220,0.16,'sawtooth',0.10,0,150); }
    function damage(){ tone(160,0.30,'square',0.16,0,70); }
    function levelup(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.18,'sine',0.14,i*0.07)); }
    function bossIn(){ tone(110,0.6,'sawtooth',0.18,0,70); tone(146,0.6,'square',0.10,0.05); }
    function bossHit(){ const n=performance.now(); if(n-lastShoot<0){} tone(330,0.07,'square',0.08,0,260); }
    function gover(){ [392,330,262,196].forEach((f,i)=>tone(f,0.34,'triangle',0.16,i*0.16)); }
    function clear(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.32,'sine',0.18,i*0.12)); [392,523,659].forEach((f,i)=>tone(f,0.6,'triangle',0.10,0.1+i*0.12)); }
    return { init, resume, startBGM, toggle, shoot, collect, friend, damage, levelup, bossIn, bossHit, gover, clear, isOn:()=>on };
  })();

  // ===== 漢字に自動でふりがな（ルビ）を振る =====
  const FURI=[
    ['砂浜','すなはま'],['自動','じどう'],['発射','はっしゃ'],['左右','さゆう'],
    ['移動','いどう'],['回収','かいしゅう'],['仲間','なかま'],['出現','しゅつげん'],
    ['決戦','けっせん'],['登場','とうじょう'],['縦向','たてむ'],['到達','とうたつ'],
    ['撃破','げきは'],['画面','がめん'],['最強','さいきょう'],['完全','かんぜん'],
    ['水','みず'],['指','ゆび'],['動','うご'],['流','なが'],['当','あ'],['点','てん'],
    ['減','へ'],['遊','あそ'],['逃','に'],['浴','あ'],['生','い'],['物','もの'],
    ['海','うみ'],['守','まも']
  ];
  function rubify(html){
    let s=String(html);
    for(let i=0;i<FURI.length;i++){ s=s.split(FURI[i][0]).join(''+i+''); }
    for(let i=0;i<FURI.length;i++){ s=s.split(''+i+'').join('<ruby>'+FURI[i][0]+'<rt>'+FURI[i][1]+'</rt></ruby>'); }
    return s;
  }

  const CHARS=[
    {face:'👦', nm:'おうすけ', img:IMG_OUSUKE},
    {face:'👧', nm:'りょう', img:IMG_RYO},
    {face:'🧒', nm:'りん', img:IMG_RIN},
    {face:'👩', nm:'るい', img:IMG_RUI},
  ];
  CHARS.forEach(c=>{ if(c.img){ const im=new Image(); im.src=c.img; c.imgEl=im; } });
  let selectedChar=0;
  function faceHTML(c,px){ return c.img
    ? `<img src="${c.img}" alt="${c.nm}" style="width:${px}px;height:${px}px;border-radius:50%;background:#fff;object-fit:contain;display:block;margin:0 auto;box-shadow:0 2px 6px rgba(0,0,0,.2);">`
    : `<span style="font-size:${px}px;line-height:1;">${c.face}</span>`; }
  CHARS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='char'+(i===0?' sel':'');
    d.innerHTML=`<div class="face">${faceHTML(c,40)}</div><div class="nm">${c.nm}</div>`;
    d.addEventListener('click',()=>{
      selectedChar=i;
      [...charPick.children].forEach((el,j)=>el.classList.toggle('sel',j===i));
    });
    charPick.appendChild(d);
  });

  const TRASH=['🛍️','🍼','🥫','🧃','👟','🥤'];
  const FRIENDS=['🦀','🐠'];
  const NORMAL_BOSS=[300,500];   // ゴミ大王が出るスコア（2回）
  const FINAL_DELAY=10000;       // 2体目撃破からラスボス登場までの時間(ms)

  let player,bullets,items,particles,clouds,birdsBg,waveT;
  let score,lives,running,lastSpawn,spawnGap,fireCooldown,level,shakeT;
  let touching,touchX,flashT,flashColor,prevLevel;
  let boss,bossBullets,bossIndex,finalTimer,finalSpawned;
  let demote,demoteTimer; // 仲間に当てたときのレベルダウン量と回復タイマー
  let noDamage; // 一度もダメージ（ライフ減）を受けていないか
  let best=0; try{best=parseInt(localStorage.getItem('beachCleanBest')||'0',10)||0;}catch(e){}
  let playerEmoji='👦', playerImgEl=null;

  function reset(){
    player={x:W/2,y:H-78,size:54,bob:0};
    bullets=[]; items=[]; particles=[];
    score=0; lives=3; running=true;
    lastSpawn=0; spawnGap=950; fireCooldown=0; level=1; shakeT=0;
    touching=false; touchX=player.x; flashT=0; prevLevel=1; waveT=0;
    boss=null; bossBullets=[]; bossIndex=0; finalTimer=-1; finalSpawned=false;
    demote=0; demoteTimer=0; noDamage=true;
    initDeco(); updateHUD();
  }
  function initDeco(){
    clouds=[]; for(let i=0;i<4;i++) clouds.push({x:Math.random()*W,y:20+Math.random()*H*0.18,s:0.06+Math.random()*0.08,sz:40+Math.random()*30});
  }

  function updateHUD(){
    scoreVal.textContent=score;
    livesEl.textContent=lives>0?'❤️'.repeat(lives):'💔';
    const lv=curLevel();
    const base = lv===3?'Lv.3 ⚡ビーム' : lv===2?'Lv.2 ダブル':'Lv.1 ノーマル';
    levelTag.textContent = (demote>0?'📉 ':'')+base;
  }
  function scoreLevel(){ return score>=200?3:score>=100?2:1; }
  function curLevel(){ return Math.max(1, scoreLevel()-demote); } // ペナルティでレベルダウン
  function showToast(m){ toast.innerHTML=rubify(m); toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.classList.remove('show'),1300); }

  // 入力
  function pos(e){ const r=cv.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return {x:p.clientX-r.left,y:p.clientY-r.top}; }
  function down(e){ if(!running)return; e.preventDefault(); AUD.resume(); touching=true; touchX=pos(e).x; }
  function move(e){ if(!running)return; e.preventDefault(); if(touching) touchX=pos(e).x; }
  function up(e){ e.preventDefault(); touching=false; }
  cv.addEventListener('touchstart',down,{passive:false});
  cv.addEventListener('touchmove',move,{passive:false});
  cv.addEventListener('touchend',up,{passive:false});
  cv.addEventListener('touchcancel',up,{passive:false});
  cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  // ページ全体のスワイプによる「引っぱって更新（リロード）」やズームを防止
  document.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
  document.addEventListener('gesturestart',e=>e.preventDefault());
  let lastTouchEnd=0;
  document.addEventListener('touchend',e=>{ const n=Date.now(); if(n-lastTouchEnd<=300) e.preventDefault(); lastTouchEnd=n; },{passive:false});

  function spawn(){
    const friendChance=0.1+Math.min(score/5000,0.05);
    const isFriend=Math.random()<friendChance;
    const emoji=isFriend?FRIENDS[(Math.random()*FRIENDS.length)|0]:TRASH[(Math.random()*TRASH.length)|0];
    const size=40+Math.random()*8;
    items.push({ x:size+Math.random()*(W-size*2), y:-size, size, emoji, friend:isFriend,
      vy:1.0+Math.random()*0.7+Math.min(score/700,1.6),
      sway:Math.random()*Math.PI*2, swaySp:0.02+Math.random()*0.03, swayAmp:16+Math.random()*22,
      rot:(Math.random()-.5)*0.4 });
  }

  function fire(){
    AUD.shoot();
    const lv=curLevel(), y=player.y-30;
    if(lv===1){ bullets.push(mk(player.x,y,0,1)); }
    else if(lv===2){ bullets.push(mk(player.x-13,y,0,1)); bullets.push(mk(player.x+13,y,0,1)); }
    else { bullets.push(mk(player.x,y,0,1.35)); bullets.push(mk(player.x-18,y,-0.5,1.05)); bullets.push(mk(player.x+18,y,0.5,1.05)); }
  }
  function mk(x,y,vx,scale){ return {x,y,vx:vx||0,vy:-10,r:9*scale,trail:[]}; }

  function burst(x,y,good){
    const n=good?9:7;
    for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,txt:good?(Math.random()<.5?'💧':'✨'):'💥',size:14+Math.random()*10}); }
  }

  function update(dt){
    waveT+=dt*0.004;
    player.bob+=0.12;
    const target=Math.max(player.size/2,Math.min(W-player.size/2,touchX));
    player.x+=(target-player.x)*0.25;

    if(touching){ fireCooldown-=dt; const rate=curLevel()===3?65:curLevel()===2?145:215;
      if(fireCooldown<=0){ fire(); fireCooldown=rate; } }

    for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
      b.trail.push({x:b.x,y:b.y}); if(b.trail.length>5) b.trail.shift();
      b.x+=b.vx; b.y+=b.vy; if(b.y<-30) bullets.splice(i,1); }

    // ボス登場の管理
    if(!boss){
      if(bossIndex<NORMAL_BOSS.length && score>=NORMAL_BOSS[bossIndex]) spawnBoss(false);
      else if(finalTimer>0 && !finalSpawned){ finalTimer-=dt; if(finalTimer<=0) spawnBoss(true); }
    }

    // 通常ゴミのスポーン（ボス戦中は止める）
    if(!boss){
      lastSpawn+=dt; spawnGap=Math.max(420,950-score*0.9);
      if(lastSpawn>=spawnGap){ lastSpawn=0; spawn(); }
    }

    if(boss) updateBoss(dt);

    for(let i=items.length-1;i>=0;i--){ const it=items[i];
      it.sway+=it.swaySp; it.y+=it.vy; it.dx=Math.sin(it.sway)*it.swayAmp;
      const ix=it.x+it.dx; let hit=false;
      for(let j=bullets.length-1;j>=0;j--){ const b=bullets[j]; const dx=b.x-ix,dy=b.y-it.y;
        if(dx*dx+dy*dy<(it.size*0.5+b.r)**2){ bullets.splice(j,1); hit=true; break; } }
      if(hit){
        if(it.friend){ score=Math.max(0,score-5); flash('#ffd24d'); shakeT=6; burst(ix,it.y,false); AUD.friend();
          if(scoreLevel()-demote>1){ demote++; } // 撃てるレベルがまだ下げられるなら1段ダウン
          demoteTimer=7000; prevLevel=curLevel();
          showToast('🦀 仲間はそっとね！ -5点＆レベルダウン'); updateHUD(); }
        else { score+=10; burst(ix,it.y,true); AUD.collect(); checkLevelUp(); updateHUD(); }
        items.splice(i,1); continue;
      }
      if(it.y>H+it.size){
        if(!it.friend){ lives--; noDamage=false; flash('#ff5a5a'); shakeT=8; AUD.damage(); showToast('⬇️ ゴミを逃した！ -1'); updateHUD(); if(lives<=0) gameOver(); }
        items.splice(i,1);
      }
    }

    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; if(p.life<=0) particles.splice(i,1); }
    for(const c of clouds){ c.x+=c.s*dt*0.06; if(c.x>W+60) c.x=-60; }
    // レベルダウンの回復（一定時間ごとに1段ずつ戻る）
    if(demote>0){ demoteTimer-=dt; if(demoteTimer<=0){ demote--; demoteTimer=7000; prevLevel=curLevel();
      showToast('🔧 ショット かいふく！'); updateHUD(); } }

    if(shakeT>0) shakeT--; if(flashT>0) flashT--;
  }

  function checkLevelUp(){ const lv=curLevel(); if(lv>prevLevel){ prevLevel=lv; AUD.levelup();
    if(lv===2) showToast('⚡ Lv.2！ ダブルショット！'); if(lv===3) showToast('🌟 Lv.3！ ビームモード！');
    for(let i=0;i<14;i++) burst(player.x,player.y-30,true); } else { prevLevel=lv; } }
  function flash(c){ flashT=10; flashColor=c; }

  // ===== ボス =====
  function spawnBoss(isFinal){
    if(isFinal){
      finalSpawned=true; finalTimer=-1;
      boss={ x:W/2, y:-140, ty:Math.max(150,H*0.20), size:134,
        hp:40, maxhp:40, dir:Math.random()<.5?-1:1, vx:1.7,
        fireT:1100, hurtT:0, entering:true, wob:0, final:true, name:'ゴミラ' };
      shakeT=20; showToast('🚨 ラスボス「ゴミラ」あらわる！');
    } else {
      bossIndex++; // 何体目か
      boss={ x:W/2, y:-90, ty:Math.max(120,H*0.17), size:96,
        hp:20, maxhp:20, dir:Math.random()<.5?-1:1, vx:1.3+bossIndex*0.3,
        fireT:1400, hurtT:0, entering:true, wob:0, final:false, name:'ゴミだいおう' };
      shakeT=14; showToast('⚠️ ゴミだいおう とうじょう！');
    }
    AUD.bossIn();
    bossBullets=[];
  }
  function updateBoss(dt){
    const b=boss; b.wob+=0.08;
    if(b.entering){ b.y+=(b.ty-b.y)*0.06; if(Math.abs(b.y-b.ty)<2){ b.y=b.ty; b.entering=false; } return; }
    // 横移動
    b.x+=b.dir*b.vx; const m=b.size*0.5;
    if(b.x<m){ b.x=m; b.dir=1; } if(b.x>W-m){ b.x=W-m; b.dir=-1; }
    if(Math.random()<0.012) b.dir*=-1;
    if(b.hurtT>0) b.hurtT--;
    // 攻撃
    b.fireT-=dt;
    if(b.fireT<=0){ b.fireT=(b.final?700:900)+Math.random()*500; bossFire(); }
    // プレイヤーの水玉との当たり判定
    for(let j=bullets.length-1;j>=0;j--){ const p=bullets[j]; const dx=p.x-b.x,dy=p.y-b.y;
      if(dx*dx+dy*dy<(b.size*0.45+p.r)**2){ bullets.splice(j,1); b.hp--; b.hurtT=7; burst(p.x,p.y,true); AUD.bossHit(); shakeT=Math.max(shakeT,4);
        if(b.hp<=0){ bossDefeated(); return; } } }
    // ボスの弾
    for(let i=bossBullets.length-1;i>=0;i--){ const o=bossBullets[i]; o.x+=o.vx; o.y+=o.vy; o.vy+=0.06; o.sp+=0.2;
      const dx=o.x-player.x, dy=o.y-(player.y-4);
      if(dx*dx+dy*dy<(player.size*0.34+o.r)**2){ bossBullets.splice(i,1); lives--; noDamage=false; flash('#ff5a5a'); shakeT=12; AUD.damage();
        showToast('💥 ヘドロを浴びた！ -1'); updateHUD(); if(lives<=0){ gameOver(); return; } continue; }
      if(o.y>H+30||o.x<-30||o.x>W+30) bossBullets.splice(i,1);
    }
  }
  function bossFire(){
    const b=boss; const ang=Math.atan2(player.y-b.y, player.x-b.x);
    const fin=b.final;
    const spread = fin?[-0.4,-0.13,0.13,0.4]:[-0.18,0.18]; // ラスボスは原子ブレス（4連射）
    const sp = fin?3.1:2.6;
    for(const s of spread){ const a=ang+s;
      bossBullets.push({ x:b.x, y:b.y+b.size*0.3, vx:Math.cos(a)*sp, vy:Math.max(1.2,Math.sin(a)*sp), r:fin?13:11, sp:0, fire:fin }); }
  }
  function bossDefeated(){
    const wasFinal=boss.final;
    score += wasFinal?300:100; updateHUD();
    const n=wasFinal?42:26;
    for(let i=0;i<n;i++) burst(boss.x+(Math.random()-.5)*boss.size, boss.y+(Math.random()-.5)*boss.size, true);
    shakeT=20;
    if(wasFinal){ boss=null; bossBullets=[]; gameClear(); return; }
    boss=null; bossBullets=[]; lastSpawn=0;
    if(bossIndex>=NORMAL_BOSS.length){ finalTimer=FINAL_DELAY; // 2体目撃破→カウント開始
      showToast('🎉 げきは！まもなく ラスボス…'); }
    else showToast('🎉 ゴミだいおう げきは！ +100');
  }

  // ===== 描画 =====
  function drawBg(){
    // 空
    const sky=ctx.createLinearGradient(0,0,0,H*0.55);
    sky.addColorStop(0,'#7ec9ef'); sky.addColorStop(1,'#bfe9fb');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.55);
    // 太陽
    ctx.save(); ctx.globalAlpha=.9; ctx.fillStyle='#fff4c2';
    ctx.beginPath(); ctx.arc(W*0.82,H*0.12,30,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=.25; ctx.beginPath(); ctx.arc(W*0.82,H*0.12,46,0,Math.PI*2); ctx.fill(); ctx.restore();
    // 雲
    for(const c of clouds){ ctx.save(); ctx.globalAlpha=.85; ctx.fillStyle='#fff';
      cloud(c.x,c.y,c.sz); ctx.restore(); }
    // 海
    const seaTop=H*0.42;
    const sea=ctx.createLinearGradient(0,seaTop,0,H*0.62);
    sea.addColorStop(0,'#2f9fd0'); sea.addColorStop(1,'#1f6fa8');
    ctx.fillStyle=sea; ctx.fillRect(0,seaTop,W,H*0.62-seaTop);
    // 波打ち際（白いライン）
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3;
    for(let k=0;k<2;k++){ ctx.beginPath(); const yy=seaTop+10+k*14;
      for(let x=0;x<=W;x+=8){ const y=yy+Math.sin(x*0.05+waveT*2+k)*3; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke(); }
    ctx.restore();
    // 砂浜
    const sandTop=H*0.58;
    const sand=ctx.createLinearGradient(0,sandTop,0,H);
    sand.addColorStop(0,'#f4d99a'); sand.addColorStop(1,'#e3bd72');
    ctx.fillStyle=sand;
    ctx.beginPath(); ctx.moveTo(0,sandTop+Math.sin(waveT)*4);
    for(let x=0;x<=W;x+=10){ const y=sandTop+Math.sin(x*0.04+waveT*1.5)*6; ctx.lineTo(x,y); }
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
    // 泡の波打ち際
    ctx.save(); ctx.globalAlpha=.5; ctx.fillStyle='#fff';
    for(let x=0;x<W;x+=18){ const y=sandTop+Math.sin(x*0.04+waveT*1.5)*6; ctx.beginPath(); ctx.arc(x,y,4+Math.sin(x+waveT*3)*2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
    // 砂のつぶ
    ctx.save(); ctx.globalAlpha=.12; ctx.fillStyle='#a87f3a';
    for(let i=0;i<30;i++){ const x=(i*53%W), y=sandTop+20+((i*97)%(H-sandTop-20)); ctx.fillRect(x,y,2,2); }
    ctx.restore();
  }
  function cloud(x,y,s){ ctx.beginPath();
    ctx.arc(x,y,s*0.5,0,Math.PI*2); ctx.arc(x+s*0.5,y+4,s*0.4,0,Math.PI*2);
    ctx.arc(x-s*0.5,y+4,s*0.38,0,Math.PI*2); ctx.arc(x,y+8,s*0.45,0,Math.PI*2); ctx.fill(); }

  function emoji(txt,x,y,size){ ctx.font=size+"px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(txt,x,y); }
  function drawPlayerFace(x,y,size){
    if(playerImgEl && playerImgEl.complete && playerImgEl.naturalWidth){
      const r=size*0.6, d=size*1.04;
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.92)'; ctx.shadowColor='rgba(0,0,0,.28)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2; ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
      ctx.drawImage(playerImgEl, x-d/2, y-d/2, d, d);
      ctx.restore();
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.lineWidth=2.5; ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.stroke();
    } else { emoji(playerEmoji,x,y,size); }
  }
  function playerTag(){ const c=CHARS[selectedChar];
    return c.img ? `<img src="${c.img}" style="width:1.6em;height:1.6em;border-radius:50%;background:#fff;object-fit:contain;vertical-align:-0.45em;box-shadow:0 1px 4px rgba(0,0,0,.25);">` : c.face; }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawBullet(b){
    // 水滴トレイル
    for(let i=0;i<b.trail.length;i++){ const t=b.trail[i]; const a=(i+1)/b.trail.length*0.4;
      ctx.globalAlpha=a; ctx.fillStyle='#bfefff'; ctx.beginPath(); ctx.arc(t.x,t.y,b.r*0.7,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1;
    // 本体（はっきり見える青白い玉＋濃い縁）
    ctx.save();
    ctx.shadowColor='rgba(0,120,200,.9)'; ctx.shadowBlur=10;
    const g=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,1,b.x,b.y,b.r);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.5,'#7fd4ff'); g.addColorStop(1,'#1486d6');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle='#0a5f9e'; ctx.stroke();
    // ハイライト
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.beginPath(); ctx.arc(b.x-b.r*0.35,b.y-b.r*0.35,b.r*0.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawBoss(){
    const b=boss; const cx=b.x, cy=b.y+Math.sin(b.wob)*4; const s=b.size;
    const hurt=b.hurtT>0 && (b.hurtT%2===0);
    ctx.save();
    if(b.final) drawKaiju(cx,cy,s,hurt,b);
    else drawSludge(cx,cy,s,hurt,b);
    ctx.restore();
    // HPバー
    const bw=s*1.0, bh=10, bx=cx-bw/2, by=cy-s*0.66;
    ctx.fillStyle='rgba(0,0,0,.3)'; roundRect(bx-2,by-2,bw+4,bh+4,6); ctx.fill();
    ctx.fillStyle='#5a2b2b'; roundRect(bx,by,bw,bh,5); ctx.fill();
    const hpw=bw*Math.max(0,b.hp)/b.maxhp;
    const frac=b.hp/b.maxhp;
    ctx.fillStyle= frac>0.5?'#5fd35f':frac>0.2?'#ffc23d':'#ff5a5a';
    if(hpw>0){ roundRect(bx,by,hpw,bh,5); ctx.fill(); }
    ctx.fillStyle='#fff'; ctx.font="bold 12px 'Apple Color Emoji',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((b.final?'🦖 ':'')+b.name+'  HP '+Math.max(0,b.hp)+'/'+b.maxhp, cx, by-12);
  }
  function drawSludge(cx,cy,s,hurt,b){
    ctx.shadowColor='rgba(40,60,20,.5)'; ctx.shadowBlur=14;
    const g=ctx.createRadialGradient(cx-s*0.2,cy-s*0.2,4,cx,cy,s*0.55);
    g.addColorStop(0, hurt?'#ff8f8f':'#8fae5a'); g.addColorStop(1, hurt?'#d83a3a':'#52702a');
    ctx.fillStyle=g; ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.35){ const rr=s*0.46*(1+Math.sin(a*3+b.wob)*0.06); const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr*0.9; a===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
    emoji('🥫',cx-s*0.28,cy+s*0.18,24); emoji('🛍️',cx+s*0.26,cy+s*0.12,24);
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx-s*0.16,cy-s*0.08,s*0.13,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.16,cy-s*0.08,s*0.13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(cx-s*0.14,cy-s*0.05,s*0.06,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.18,cy-s*0.05,s*0.06,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#222'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-s*0.28,cy-s*0.22); ctx.lineTo(cx-s*0.05,cy-s*0.13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.28,cy-s*0.22); ctx.lineTo(cx+s*0.05,cy-s*0.13); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy+s*0.18,s*0.14,Math.PI,0,true); ctx.stroke();
  }
  function drawKaiju(cx,cy,s,hurt,b){
    // ゴジラ風ラスボス「ゴミラ」: 背びれ＋🦖本体＋原子ブレスのチャージ光
    // 背びれ（青白く発光するギザギザ）
    ctx.save();
    ctx.shadowColor='rgba(120,220,255,.95)'; ctx.shadowBlur=16;
    ctx.fillStyle = hurt?'#ffffff':'#bfe9ff';
    for(let i=-2;i<=2;i++){ const fx=cx + i*s*0.13; const base=cy - s*0.16;
      const fh=s*0.20*(1-Math.abs(i)*0.13);
      ctx.beginPath(); ctx.moveTo(fx-s*0.06, base+fh); ctx.lineTo(fx, base-fh); ctx.lineTo(fx+s*0.06, base+fh); ctx.closePath(); ctx.fill(); }
    ctx.restore();
    // 被弾フラッシュ
    if(hurt){ ctx.save(); ctx.globalAlpha=.45; ctx.fillStyle='#ff5a5a';
      ctx.beginPath(); ctx.arc(cx,cy,s*0.5,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    // 本体（恐竜＝カイジュウ）
    ctx.save(); ctx.shadowColor='rgba(30,90,50,.7)'; ctx.shadowBlur=14;
    emoji('🦖',cx,cy,s*0.98); ctx.restore();
    // 足元の街（スケール感）
    ctx.globalAlpha=.55; emoji('🏙️',cx,cy+s*0.42,s*0.34); ctx.globalAlpha=1;
    // 口元の原子ブレスのチャージ光（発射直前にピカッ）
    if(b.fireT<300){ ctx.save(); const gl=ctx.createRadialGradient(cx,cy+s*0.18,1,cx,cy+s*0.18,s*0.2);
      gl.addColorStop(0,'rgba(180,255,200,.95)'); gl.addColorStop(1,'rgba(120,255,160,0)');
      ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(cx,cy+s*0.18,s*0.2,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  }
  function drawBossBullet(o){
    ctx.save();
    if(o.fire){ // ラスボスの原子ブレス（オレンジ〜緑の熱線）
      ctx.shadowColor='rgba(120,255,150,.95)'; ctx.shadowBlur=12;
      const g=ctx.createRadialGradient(o.x-o.r*0.3,o.y-o.r*0.3,1,o.x,o.y,o.r);
      g.addColorStop(0,'#eaffd0'); g.addColorStop(0.45,'#7dff8a'); g.addColorStop(1,'#1f9c4a');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle='#0f6b2e'; ctx.stroke();
    } else {
      ctx.shadowColor='rgba(60,90,30,.9)'; ctx.shadowBlur=10;
      const g=ctx.createRadialGradient(o.x-o.r*0.3,o.y-o.r*0.3,1,o.x,o.y,o.r);
      g.addColorStop(0,'#cfe39a'); g.addColorStop(0.5,'#7c9c3e'); g.addColorStop(1,'#3f5418');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle='#2c3a10'; ctx.stroke();
    }
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.save();
    if(shakeT>0) ctx.translate((Math.random()-.5)*shakeT*0.8,(Math.random()-.5)*shakeT*0.8);
    drawBg();

    for(const it of items){
      const ix=it.x+(it.dx||0);
      // 仲間には「うたないで！」の吹き出しを表示
      if(it.friend){
        ctx.save();
        const bx=ix, by=it.y-it.size*0.7;
        ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const label='うたないで！'; const tw=ctx.measureText(label).width;
        ctx.globalAlpha=.92; ctx.fillStyle='#fff';
        roundRect(bx-tw/2-7,by-11,tw+14,22,11); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bx-5,by+9); ctx.lineTo(bx+5,by+9); ctx.lineTo(bx,by+15); ctx.closePath(); ctx.fill();
        ctx.globalAlpha=1; ctx.fillStyle='#e23b3b'; ctx.fillText(label,bx,by);
        ctx.restore();
      }
      ctx.save(); ctx.translate(ix,it.y); ctx.rotate(Math.sin(it.sway)*0.25+it.rot);
      if(it.friend){ ctx.shadowColor='rgba(120,255,180,.85)'; ctx.shadowBlur=16; }
      else {
        // 背景（砂浜・海・空）に埋もれないよう、白い円の台＋影＋縁取りで浮かせる
        ctx.save();
        ctx.shadowColor='rgba(0,0,0,.38)'; ctx.shadowBlur=7; ctx.shadowOffsetY=2;
        ctx.fillStyle='rgba(255,255,255,.82)';
        ctx.beginPath(); ctx.arc(0,0,it.size*0.5,0,Math.PI*2); ctx.fill();
        ctx.restore();
        ctx.lineWidth=2.5; ctx.strokeStyle='rgba(255,255,255,.95)';
        ctx.beginPath(); ctx.arc(0,0,it.size*0.5,0,Math.PI*2); ctx.stroke();
        ctx.shadowColor='rgba(0,0,0,.22)'; ctx.shadowBlur=3; ctx.shadowOffsetY=1; // 絵文字自体にも軽い影で輪郭をはっきり
      }
      emoji(it.emoji,0,0,it.size); ctx.restore(); }

    for(const b of bullets) drawBullet(b);

    if(boss) drawBoss();
    for(const o of bossBullets) drawBossBullet(o);

    // プレイヤー（はっきり見えるよう影付き円台＋リング＋大きめ）
    const py=player.y+Math.sin(player.bob)*2;
    ctx.save();
    // 足元の影
    ctx.globalAlpha=.25; ctx.fillStyle='#7a5520';
    ctx.beginPath(); ctx.ellipse(player.x,player.y+26,player.size*0.42,player.size*0.16,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // 白いハイライトリング
    ctx.beginPath(); ctx.arc(player.x,py-4,player.size*0.6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.stroke();
    // 本体
    ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
    drawPlayerFace(player.x,py-4,player.size);
    ctx.restore();
    // 水鉄砲の噴射
    if(touching){ ctx.globalAlpha=.7; emoji('💦',player.x,py-30,24); ctx.globalAlpha=1; }

    for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); emoji(p.txt,p.x,p.y,p.size); }
    ctx.globalAlpha=1;
    ctx.restore();

    if(flashT>0){ ctx.globalAlpha=flashT/10*0.35; ctx.fillStyle=flashColor; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
  }

  // 永続ループを1本だけ回す（多重起動を防止）。running が true のときだけ更新する。
  let last=0, loopStarted=false;
  function loop(now){
    const dt=Math.min(50, now-last); last=now;
    if(running){ update(dt); draw(); }
    requestAnimationFrame(loop);
  }
  function ensureLoop(){ if(!loopStarted){ loopStarted=true; last=performance.now(); requestAnimationFrame(loop); } }

  function goStart(){ // スタート画面（キャラ選択）に戻る
    overScreen.classList.add('hidden'); overScreen.style.background='';
    startScreen.classList.remove('hidden');
  }
  function rainCreatures(layer){
    if(!layer) return;
    const set=['🐠','🦀'];
    for(let i=0;i<34;i++){
      const s=document.createElement('span'); s.className='rain';
      s.textContent=set[i%2];
      s.style.left=(Math.random()*100)+'%';
      s.style.fontSize=(22+Math.random()*26)+'px';
      s.style.animationDuration=(2.4+Math.random()*3.2)+'s';
      s.style.animationDelay=(-Math.random()*5).toFixed(2)+'s';
      layer.appendChild(s);
    }
  }
  function gameClear(){ running=false; AUD.clear();
    const perfect=noDamage;
    if(perfect) score+=200; // ノーダメージ・ボーナス
    if(score>best){ best=score; try{localStorage.setItem('beachCleanBest',String(best));}catch(e){} }
    overScreen.classList.remove('hidden');
    if(perfect){
      // ★ノーダメージ・エンディング
      overScreen.style.background='linear-gradient(180deg,#ffe8a0 0%,#ffd36b 40%,#ffbf5a 70%,#ff9d3d 100%)';
      overScreen.innerHTML=`
        <div class="rainLayer" id="rainLayer"></div>
        <div class="endContent">
          <div class="emoji" style="font-size:60px;">👑✨</div>
          <div class="title" style="font-size:38px;">パーフェクトクリア！</div>
          <div class="sub" style="margin-top:10px;">${playerTag()} ノーダメージで ゴミラを撃破！<br>まもった生き物たちが おいわいに あつまってきた！🐠🦀</div>
          <div id="finalScore">${score} 点</div>
          <div id="bestScore">ノーダメージ・ボーナス +200！　ベスト：${best} 点</div>
          <div class="rules" style="text-align:center">🏖️ 海も砂浜も生き物も、ぜんぶ守りきった！<br>きみは ほんとうの まもりびとだ。</div>
          <button class="btn" id="againBtn">🔄 もう一度</button>
        </div>`;
      overScreen.innerHTML=rubify(overScreen.innerHTML);
      rainCreatures(document.getElementById('rainLayer'));
    } else {
      // 通常エンディング
      overScreen.style.background='linear-gradient(180deg,#5bc6e8 0%,#7fd6ee 45%,#ffe1a3 46%,#f6cd7d 100%)';
      overScreen.innerHTML=`
        <div class="emoji" style="font-size:56px;">🏆🎉</div>
        <div class="title" style="font-size:38px;">クリア！</div>
        <div class="sub" style="margin-top:10px;">${playerTag()} ラスボス「ゴミラ」をたおして<br>ビーチを かんぜんに きれいにした！</div>
        <div id="finalScore">${score} 点</div>
        <div id="bestScore">ベストスコア：${best} 点</div>
        <div class="rules" style="text-align:center">🌟 きみは さいきょうの ビーチクリーンヒーロー！🦖<br>つぎは ノーダメージ・クリアに ちょうせん！</div>
        <button class="btn" id="againBtn">🔄 もう一度</button>`;
      overScreen.innerHTML=rubify(overScreen.innerHTML);
    }
    document.getElementById('againBtn').addEventListener('click',goStart);
  }

  function gameOver(){ running=false; AUD.gover();
    if(score>best){ best=score; try{localStorage.setItem('beachCleanBest',String(best));}catch(e){} }
    overScreen.classList.remove('hidden');
    overScreen.innerHTML=`
      <div class="title" style="font-size:38px;">🏖️ おしまい！</div>
      <div class="sub" style="margin-top:10px;">${playerTag()} ビーチそうじ おつかれさま！</div>
      <div id="finalScore">${score} 点</div>
      <div id="bestScore">ベストスコア：${best} 点</div>
      <div class="rules" style="text-align:center">
        ${score>=200?'🌟 ビームマスター！すごい！':score>=100?'⚡ ダブルショットまで到達！':'💧 もっと砂浜をきれいにできるよ！'}
      </div>
      <button class="btn" id="againBtn">🔄 もう一度</button>`;
    overScreen.innerHTML=rubify(overScreen.innerHTML);
    document.getElementById('againBtn').addEventListener('click',goStart);
  }

  let starting=false;
  function start(){
    if(starting) return; starting=true; setTimeout(()=>starting=false,500); // 連打・二重起動ガード
    resize();
    const pc=CHARS[selectedChar]; playerEmoji=pc.face; playerImgEl=(pc.img&&pc.imgEl)?pc.imgEl:null;
    startScreen.classList.add('hidden'); overScreen.classList.add('hidden'); overScreen.style.background='';
    reset(); last=performance.now(); ensureLoop();
    AUD.startBGM();
  }

  document.getElementById('playBtn').addEventListener('click',start);
  const muteBtn=document.getElementById('muteBtn');
  muteBtn.addEventListener('click',()=>{ const on=AUD.toggle(); muteBtn.textContent=on?'🔊':'🔇'; });
  // スタート画面の漢字にふりがなを付与（イベント未付与の静的テキストのみ）
  startScreen.querySelectorAll('.sub,.pick,.rules,.hint').forEach(el=>{ el.innerHTML=rubify(el.innerHTML); });
  resize();
})();
</script>
